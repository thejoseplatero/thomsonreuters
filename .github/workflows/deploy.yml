name: Deploy to joseplatero.com/thomsonreuters
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync to joseplatero.com/thomsonreuters
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /public_html/joseplatero.com/thomsonreuters/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
